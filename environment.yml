      - geoopt==0.5.0
      - GraphRicciCurvature>=0.5.3
      - networkx>=3.0
      - scikit-learn
      - numpy
      - pandas
      - tqdm
      - fastargs
      - terminaltables
      - torchmetrics
      - huggingface_hub
      - transformers
      - datasets
