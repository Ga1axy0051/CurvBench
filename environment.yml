name: curvbench
channels:
  - pytorch
  - nvidia
  - dglteam
  - pyg
  - defaults
dependencies:
  - python=3.9
  - pytorch=2.1.2
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8
  - pyg
  - pytorch-sparse
  - pytorch-scatter
